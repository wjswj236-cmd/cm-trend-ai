        function ChatArea({ apiKey }) {
          const [source, setSource] = useState("both");
          const [messages, setMessages] = useState([]);
          const [input, setInput] = useState("");
          const [loading, setLoading] = useState(false);
          const bottomRef = useRef(null);
          const inputRef = useRef(null);

          useEffect(() => {
            bottomRef.current?.scrollIntoView({ behavior: "smooth" });
          }, [messages, loading]);

          // Exponential backoff for Gemini API
          const fetchWithRetry = async (url, options, maxRetries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
              } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
              }
            }
          };

          const sendMessage = async (text) => {
            const query = text || input.trim();
            if (!query || loading) return;
            setInput("");

            const userMsg = { role: "user", content: query };
            const newMessages = [...messages, userMsg];
            setMessages(newMessages);
            setLoading(true);

            try {
              if (!apiKey) {
                setMessages([...newMessages, { role: "assistant", content: "⚠️ APIキーが設定されていません。管理者設定(⚙️)から暗号化文字列を生成し、ソースコードの ENCRYPTED_API_KEY に設定してください。" }]);
                setLoading(false);
                return;
              }

              const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

              const payload = {
                contents: newMessages.map(m => ({
                  role: m.role === "user" ? "user" : "model",
                  parts: [{ text: m.content }]
                })),
                systemInstruction: {
                  parts: [{ text: buildSystemPrompt(source) }]
                }
              };

              const data = await fetchWithRetry(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "応答を取得できませんでした。";
              setMessages([...newMessages, { role: "assistant", content: textResponse }]);
            } catch (err) {
              console.error(err);
              setMessages([...newMessages, {
                role: "assistant",
                content: `⚠️ エラーが発生しました。しばらく経ってから再度お試しください。\n詳細: ${err.message}`,
              }]);
            } finally {
              setLoading(false);
              // フォーカスを戻す（デスクトップのみ）
              if (window.innerWidth >= 1024) {
                setTimeout(() => inputRef.current?.focus(), 100);
              }
            }
          };

          const handleKeyDown = (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          };

          const cfg = SOURCE_CONFIG[source];

          return (
            <div className="flex flex-col h-full w-full relative">
              {/* Header controls */}

                    <button
                      key={key}
                      onClick={() => setSource(key)}
                      className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-all ${
                        source === key ? `${c.bg} ${c.color} shadow-sm ring-1 ring-inset ring-${c.color.split('-')[1]}-500/30` : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                      }`}
                    >
                      {c.icon} <span className="hidden sm:inline">{c.label}</span>
                    </button>
                  ))}
                </div>
                
                {messages.length > 0 && (
                  <button
                    onClick={() => setMessages([])}
                    className="pointer-events-auto px-3 py-1.5 text-xs font-medium text-slate-400 bg-[#0d1526]/80 backdrop-blur-md border border-slate-700/50 rounded-lg hover:text-white hover:bg-slate-800 transition-colors"
                  >
                    会話をクリア
                  </button>
                )}
              </div>

              {/* Messages Area */}
              <div className="flex-1 overflow-y-auto pt-20 px-4 sm:px-6 pb-4 scroll-smooth">
                <div className="max-w-3xl mx-auto">
                  {messages.length === 0 ? (
                    <div className="flex flex-col items-center justify-center min-h-[60vh] text-center mt-8">
                      <div className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full ${cfg.bg} border ${cfg.border} mb-8 animate-fade-in`}>
                        <div className={`w-2 h-2 rounded-full bg-${cfg.color.split('-')[1]}-400 animate-pulse`} />
                        <span className={`text-xs font-bold tracking-widest uppercase ${cfg.color}`}>
                          {cfg.label} 接続中
                        </span>
                      </div>
                      
                      <h2 className="text-3xl sm:text-4xl font-extrabold bg-gradient-to-br from-white to-slate-400 bg-clip-text text-transparent mb-4 tracking-tight">

                      </h2>
                      <p className="text-slate-400 text-sm max-w-md mb-10 leading-relaxed">
                        エム・データが提供する最新のテレビCMメタデータとXの反響データを組み合わせ、マーケティングインサイトを抽出します。
                      </p>

                      <div className="w-full max-w-2xl text-left">
                        <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 ml-1">おすすめの質問</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {SUGGESTIONS[source].map((s, i) => (
                            <button
                              key={i}
                              onClick={() => sendMessage(s)}
                              className="text-left px-4 py-3 rounded-xl border border-slate-700/50 bg-[#0d1526]/50 hover:bg-slate-800/80 hover:border-slate-600 text-slate-300 text-sm transition-all shadow-sm flex items-start gap-3 group"
                            >
                              <span className={`mt-0.5 ${cfg.color} opacity-70 group-hover:opacity-100 transition-opacity`}><IconLightning className="w-4 h-4" /></span>
                              <span>{s}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      {messages.map((msg, i) => (
                        <MessageBubble key={i} msg={msg} sourceColor={cfg.color.split('-')[1]} />
                      ))}
                      {loading && (
                        <div className="flex items-start gap-4 animate-fade-in">
                          <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 bg-slate-800 border border-slate-700`}>
                            <div className="w-4 h-4 rounded-full border-2 border-slate-400 border-t-transparent animate-spin"></div>
                          </div>
                          <div className="px-4 py-3 rounded-2xl rounded-tl-sm bg-[#0d1526] border border-slate-800 text-slate-400 text-sm shadow-sm flex items-center gap-2">
                            データを分析しています<span className="animate-pulse">...</span>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                  <div ref={bottomRef} className="h-4" />
                </div>
              </div>

              {/* Input Area */}
              <div className="p-4 sm:p-6 bg-gradient-to-t from-[#0a0e1a] via-[#0a0e1a] to-transparent">
                <div className="max-w-3xl mx-auto relative">
                  <div className="relative flex items-end shadow-xl rounded-2xl bg-[#0d1526] border border-slate-700 focus-within:border-slate-500 focus-within:ring-1 focus-within:ring-slate-500 transition-all">
                    <textarea
                      ref={inputRef}
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder="CMトレンドやSNS反響について質問する..."
                      className="flex-1 max-h-40 min-h-[56px] py-4 pl-5 pr-14 bg-transparent text-slate-100 text-sm resize-none outline-none leading-relaxed placeholder:text-slate-500"
                      rows={1}
                    />
                    <button
                      onClick={() => sendMessage()}
                      disabled={loading || !input.trim()}
                      className={`absolute right-2 bottom-2 w-10 h-10 rounded-xl flex items-center justify-center transition-all ${
                        loading || !input.trim() 
                          ? "bg-slate-800 text-slate-500 cursor-not-allowed" 
                          : "bg-gradient-to-br from-blue-500 to-purple-600 text-white hover:shadow-lg hover:shadow-purple-500/20 active:scale-95"
                      }`}
                    >
                      <IconSend className="w-5 h-5" />
                    </button>
                  </div>
                  <div className="text-center mt-2">
                    <span className="text-[10px] text-slate-500 font-medium">Shift + Enter で改行</span>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function MessageBubble({ msg, sourceColor }) {
          const isUser = msg.role === "user";

          const renderContent = (text) => {
            return text.split("\n").map((line, i) => {
              if (line.match(/^#{2,3}\s+(.*)/)) {
                const text = line.replace(/^#{2,3}\s+/, "");
                return <h3 key={i} className="text-lg font-bold text-white mt-5 mb-2 border-b border-slate-700/50 pb-1">{text}</h3>;
              }
              if (line.match(/^[-*]\s+(.*)/)) {
                const text = line.replace(/^[-*]\s+/, "");
                return (
                  <div key={i} className="flex gap-2 mb-1.5 ml-1">
                    <span className={`text-${sourceColor}-400 mt-1 flex-shrink-0`}><IconLightning className="w-3.5 h-3.5" /></span>
                    <span dangerouslySetInnerHTML={{ __html: formatBold(text) }} />
                  </div>
                );
              }
              if (line.match(/^\d+\.\s+(.*)/)) {
                const num = line.match(/^(\d+)/)[1];
                const text = line.replace(/^\d+\.\s+/, "");
                return (
                  <div key={i} className="flex gap-2.5 mb-1.5 ml-1 items-start">
                    <span className={`text-[10px] font-bold bg-${sourceColor}-500/20 text-${sourceColor}-300 px-1.5 py-0.5 rounded mt-0.5 flex-shrink-0`}>{num}</span>
                    <span dangerouslySetInnerHTML={{ __html: formatBold(text) }} />
                  </div>
                );
              }
              if (line.trim() === "") return <div key={i} className="h-3" />;
              
              return <div key={i} className="mb-1.5 leading-relaxed" dangerouslySetInnerHTML={{ __html: formatBold(line) }} />;
            });
          };

          const formatBold = (text) => {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-slate-100 font-bold">$1</strong>');
          };

          return (
            <div className={`flex items-start gap-3 sm:gap-4 ${isUser ? "flex-row-reverse" : "flex-row"}`}>
              <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-sm ${
                isUser 
                  ? "bg-gradient-to-br from-slate-700 to-slate-800 border border-slate-600" 
                  : `bg-gradient-to-br from-${sourceColor}-600/20 to-${sourceColor}-500/10 border border-${sourceColor}-500/30`
              }`}>
                {isUser ? <IconUser className="w-4 h-4 sm:w-5 sm:h-5 text-slate-300" /> : <div className={`font-bold text-xs sm:text-sm text-${sourceColor}-400`}>AI</div>}
              </div>
              
              <div className={`max-w-[85%] sm:max-w-[75%] px-4 sm:px-5 py-3 sm:py-4 text-[13px] sm:text-[14px] shadow-sm ${
                isUser 
                  ? "bg-blue-600 text-white rounded-2xl rounded-tr-sm" 
                  : "bg-[#0d1526] border border-slate-700/60 text-slate-300 rounded-2xl rounded-tl-sm"
              }`}>
                {isUser ? msg.content : <div className="text-slate-300 space-y-0">{renderContent(msg.content)}</div>}
              </div>
            </div>
          );
        }

        function StatsDashboard({ apiKey }) {
          const [queries, setQueries] = useState(['']);
          const [startDate, setStartDate] = useState('2026-03-20');
          const [endDate, setEndDate] = useState('2026-03-26');
          const [source, setSource] = useState('both');
          
          const [hasSearched, setHasSearched] = useState(false);
          const [submittedQueries, setSubmittedQueries] = useState([]);
          const [filteredData, setFilteredData] = useState([]);
          const [comparisonText, setComparisonText] = useState('');
          const [isLoading, setIsLoading] = useState(false);

          // Gemini API呼び出し用のバックオフ関数
          const fetchWithRetry = async (url, options, maxRetries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
              } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
              }
            }
          };

          const handleAddQuery = () => {
            if (queries.length < 3) setQueries([...queries, '']);
          };

          const handleUpdateQuery = (index, value) => {
            const newQueries = [...queries];
            newQueries[index] = value;
            setQueries(newQueries);
          };

          const handleRemoveQuery = (index) => {
            const newQueries = [...queries];
            newQueries.splice(index, 1);
            setQueries(newQueries);
          };

          const handleSearch = async () => {
            const active = queries.map(q => q.trim()).filter(q => q !== '');
            setSubmittedQueries(active);
            
            let dataToDisplay = STATS_DATA;
            if (active.length > 0) {
              dataToDisplay = STATS_DATA.filter(d => 
                active.some(q => 
                  d.brand.includes(q) || d.remark.includes(q)
                )
              );
            }
            setFilteredData(dataToDisplay);
            setHasSearched(true);
            setComparisonText('');

            // 複数キーワードの場合はGeminiで比較結果を生成
            if (active.length > 1) {
              setIsLoading(true);
              try {
                if (!apiKey) {
                  setComparisonText("⚠️ APIキーが設定されていません。管理者設定(⚙️)から設定してください。");
                  setIsLoading(false);
                  return;
                }
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                
                const prompt = `以下のブランドについて、提供されているデータソースを基に比較分析を行ってください。\n\n比較対象: ${active.join(', ')}\n対象期間: ${startDate} 〜 ${endDate}\n\n結論ファーストで、各対象の違い、優位性、課題を専門的なアナリストの視点で簡潔にまとめてください。`;

                const payload = {
                  contents: [{ role: "user", parts: [{ text: prompt }] }],
                  systemInstruction: { parts: [{ text: buildSystemPrompt(source) }] }
                };

                const response = await fetchWithRetry(endpoint, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });

                const text = response.candidates?.[0]?.content?.parts?.[0]?.text || "比較結果を取得できませんでした。";
                setComparisonText(text);
              } catch (err) {
                console.error(err);
                setComparisonText("⚠️ 比較結果の生成中にエラーが発生しました。");
              } finally {
                setIsLoading(false);
              }
            }
          };

          const formatText = (text) => {
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>');
            formatted = formatted.replace(/\n/g, '<br/>');
            return formatted;
          };

          const renderSourceSelector = () => (
            <div className="flex flex-wrap gap-2">
              {Object.entries(SOURCE_CONFIG).map(([key, c]) => (
                <button
                  key={key}
                  onClick={() => setSource(key)}
                  className={`flex items-center gap-1.5 px-3 py-2 text-xs sm:text-sm font-semibold rounded-lg transition-all ${
                    source === key ? `${c.bg} ${c.color} shadow-sm ring-1 ring-inset ring-${c.color.split('-')[1]}-500/30` : 'text-slate-400 bg-slate-800/50 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                >
                  {c.icon} <span>{c.label}</span>
                </button>
              ))}
            </div>
          );

          const renderSearchForm = (isCompact = false) => (
            <div className={`bg-[#0d1526] border border-slate-800 rounded-2xl p-5 sm:p-6 shadow-lg w-full ${!isCompact ? 'max-w-2xl mx-auto' : 'mb-6'}`}>
              {!isCompact && (
                <div className="mb-6 text-center">
                  <div className="inline-flex p-3 rounded-full bg-blue-500/10 mb-3">
                    <IconChart className="w-8 h-8 text-blue-400" />
                  </div>
                  <h2 className="text-2xl font-bold text-white tracking-tight">統計ダッシュボード検索</h2>
                  <p className="text-slate-400 text-sm mt-2">キーワード、期間、データソースを指定して分析を実行します</p>
                </div>
              )}

              <div className="space-y-5">
                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">検索キーワード (最大3つ)</label>
                  <div className="space-y-3">
                    {queries.map((q, i) => (
                      <div key={i} className="flex items-center gap-2">
                        <input
                          type="text"
                          value={q}
                          onChange={(e) => handleUpdateQuery(i, e.target.value)}
                          placeholder="例: トヨタ、インディード"
                          className="flex-1 bg-slate-900 border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-xl px-4 py-2.5 text-slate-200 text-sm outline-none transition-all"
                        />
                        {queries.length > 1 && (
                          <button onClick={() => handleRemoveQuery(i)} className="p-2 text-slate-500 hover:text-red-400 transition-colors">✕</button>
                        )}
                      </div>
                    ))}
                    {queries.length < 3 && (
                      <button onClick={handleAddQuery} className="text-sm text-blue-400 hover:text-blue-300 font-medium flex items-center gap-1">+ キーワードを追加して比較</button>
                    )}
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  <div>
                    <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">検索期間</label>
                    <div className="flex items-center gap-2">
                      <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-200 text-sm outline-none [color-scheme:dark]" />
                      <span className="text-slate-500">〜</span>
                      <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-200 text-sm outline-none [color-scheme:dark]" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">データソース</label>
                    {renderSourceSelector()}
                  </div>
                </div>

                <div className={`pt-4 ${isCompact ? 'flex justify-end' : ''}`}>
                  <button 
                    onClick={handleSearch}
                    disabled={isLoading}
                    className={`w-full ${isCompact ? 'md:w-auto px-8' : ''} py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${
                      isLoading ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:shadow-lg hover:shadow-purple-500/20 active:scale-95'
                    }`}
                  >
                    {isLoading ? (
                      <><div className="w-4 h-4 rounded-full border-2 border-slate-500 border-t-transparent animate-spin"></div> 検索中...</>
                    ) : (
                      <><IconChart className="w-5 h-5" /> 分析を実行</>
                    )}
                  </button>
                </div>
              </div>
            </div>
          );

          if (!hasSearched) {
            return (
              <div className="flex-1 overflow-y-auto p-4 sm:p-8 bg-[#0a0e1a] flex flex-col items-center justify-center">
                {renderSearchForm(false)}
              </div>
            );
          }

          const maxTv = filteredData.length > 0 ? Math.max(...filteredData.map(d => d.tv)) : 0;
          const maxXViews = filteredData.length > 0 ? Math.max(...filteredData.map(d => d.xViews)) : 0;
          const totalTv = filteredData.reduce((sum, d) => sum + d.tv, 0);
          const totalViews = filteredData.reduce((sum, d) => sum + d.xViews, 0);

          return (
            <div className="flex-1 overflow-y-auto p-4 sm:p-8 bg-[#0a0e1a]">
              <div className="max-w-5xl mx-auto space-y-6 sm:space-y-8">
                
                {renderSearchForm(true)}

                {/* 比較結果 (Gemini 生成) */}
                {submittedQueries.length > 1 && (
                   <div className="bg-[#0d1526] border border-blue-500/30 rounded-2xl p-5 sm:p-6 shadow-sm relative overflow-hidden">
                     <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                     <h3 className="text-lg font-bold text-white flex items-center gap-2 mb-4">
                       <IconLightning className="w-5 h-5 text-blue-400" /> AI比較分析インサイト
                     </h3>
                     {isLoading ? (
                       <div className="text-slate-400 animate-pulse text-sm">データに基づき比較結果を生成中...</div>
                     ) : (
                       <div className="text-slate-300 text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: formatText(comparisonText) }} />
                     )}
                   </div>
                )}

                {/* Overview KPIs */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
                  <KpiCard title="総放映回数" value={totalTv} unit="回" icon={<IconTV className="w-5 h-5 text-blue-400" />} />
                  <KpiCard title="X 総表示回数" value={totalViews >= 1000 ? (totalViews/1000).toFixed(1) : totalViews} unit={totalViews >= 1000 ? "K回" : "回"} icon={<IconX className="w-5 h-5 text-purple-400" />} />
                  <KpiCard title="分析対象ブランド" value={filteredData.length} unit="社" icon={<IconDatabase className="w-5 h-5 text-emerald-400" />} />
                  <KpiCard title="期間" value="7" unit="日間" icon={<IconChart className="w-5 h-5 text-amber-400" />} />
                </div>
                
                {/* Charts Grid */}
                <div className={`grid grid-cols-1 ${source === 'both' ? 'lg:grid-cols-2' : ''} gap-4 sm:gap-6`}>
                  {/* TV Chart */}
                  {(source === 'tv' || source === 'both') && (
                  <div className="bg-[#0d1526] border border-slate-800 rounded-2xl p-5 sm:p-6 shadow-sm">
                    <div className="flex items-center gap-2 mb-6">
                      <div className="p-2 rounded-lg bg-blue-500/10"><IconTV className="w-5 h-5 text-blue-400" /></div>
                      <h3 className="text-lg font-bold text-slate-100">TVCM 放映回数ランキング</h3>
                    </div>
                    {filteredData.length > 0 ? (
                    <div className="space-y-5">
                      {[...filteredData].sort((a,b)=>b.tv - a.tv).map(d => (
                        <div key={d.brand} className="group">
                          <div className="flex justify-between text-sm mb-1.5">
                            <span className="font-medium text-slate-300 group-hover:text-white transition-colors">{d.brand}</span>
                            <span className="text-blue-400 font-bold">{d.tv}回</span>
                          </div>
                          <div className="w-full bg-slate-800/50 rounded-full h-3 overflow-hidden">
                            <div 
                              className="bg-gradient-to-r from-blue-600 to-blue-400 h-full rounded-full relative transition-all duration-500" 
                              style={{width: `${maxTv > 0 ? (d.tv/maxTv)*100 : 0}%`}}
                            >
                              <div className="absolute inset-0 bg-white/20 w-full animate-shimmer"></div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    ) : (
                      <p className="text-slate-500 text-sm">該当するデータがありません。</p>
                    )}
                  </div>
                  )}

                  {/* X Chart */}
                  {(source === 'x' || source === 'both') && (
                  <div className="bg-[#0d1526] border border-slate-800 rounded-2xl p-5 sm:p-6 shadow-sm">
                    <div className="flex items-center gap-2 mb-6">
                      <div className="p-2 rounded-lg bg-purple-500/10"><IconX className="w-5 h-5 text-purple-400" /></div>
                      <h3 className="text-lg font-bold text-slate-100">X(Twitter) 表示回数ランキング</h3>
                    </div>
                    {filteredData.length > 0 ? (
                    <div className="space-y-5">
                      {[...filteredData].sort((a,b)=>b.xViews - a.xViews).map(d => (
                        <div key={d.brand} className="group">
                          <div className="flex justify-between text-sm mb-1.5">
                            <span className="font-medium text-slate-300 group-hover:text-white transition-colors">{d.brand}</span>
                            <span className="text-purple-400 font-bold">{d.xViews === 0 ? 'データなし' : `${d.xViews.toLocaleString()}回`}</span>
                          </div>
                          <div className="w-full bg-slate-800/50 rounded-full h-3 overflow-hidden">
                            <div 
                              className="bg-gradient-to-r from-purple-600 to-purple-400 h-full rounded-full relative transition-all duration-500" 
                              style={{width: `${d.xViews === 0 ? 0 : Math.max((d.xViews/maxXViews)*100, 2)}%`}}
                            >
                               {d.xViews > 0 && <div className="absolute inset-0 bg-white/20 w-full animate-shimmer" style={{animationDelay: '0.5s'}}></div>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    ) : (
                      <p className="text-slate-500 text-sm">該当するデータがありません。</p>
                    )}
                  </div>
                  )}
                </div>

                {/* Data Table */}
                <div className="bg-[#0d1526] border border-slate-800 rounded-2xl overflow-hidden shadow-sm">
                  <div className="p-5 border-b border-slate-800 flex items-center justify-between">
                    <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                      <IconChart className="w-5 h-5 text-emerald-400" /> 総合クロス分析サマリー
                    </h3>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-800/40 text-slate-400 text-xs uppercase tracking-wider">
                        <tr>
                          <th className="px-6 py-4 font-semibold">ブランド</th>
                          <th className="px-6 py-4 font-semibold text-right">TV放映</th>
                          <th className="px-6 py-4 font-semibold text-right">X いいね</th>
                          <th className="px-6 py-4 font-semibold text-right">X 表示</th>
                          <th className="px-6 py-4 font-semibold w-full">分析サマリー</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800">
                        {filteredData.length > 0 ? filteredData.map(d => (
                          <tr key={d.brand} className="hover:bg-slate-800/30 transition-colors">
                            <td className="px-6 py-4 font-bold text-white">{d.brand}</td>
                            <td className="px-6 py-4 text-right font-medium text-blue-400">{d.tv}</td>
                            <td className="px-6 py-4 text-right font-medium text-purple-400">{d.xLikes === 0 && d.brand === 'ユニクロ' ? '-' : d.xLikes.toLocaleString()}</td>
                            <td className="px-6 py-4 text-right font-medium text-purple-400">{d.xViews === 0 && d.brand === 'ユニクロ' ? '-' : d.xViews.toLocaleString()}</td>
                            <td className="px-6 py-4 text-slate-300 whitespace-normal min-w-[200px]">{d.remark}</td>
                          </tr>
                        )) : (
                          <tr>
                            <td colSpan="5" className="px-6 py-8 text-center text-slate-500">該当するデータがありません。</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
                
                <div className="h-8"></div>
              </div>
            </div>
          );
        }

        function KpiCard({ title, value, unit, icon }) {
          return (
            <div className="bg-[#0d1526] border border-slate-800 rounded-2xl p-4 sm:p-5 flex flex-col justify-between hover:border-slate-700 transition-colors">
              <div className="flex justify-between items-start mb-3">
                <h4 className="text-xs sm:text-sm font-medium text-slate-400">{title}</h4>
                {icon}
              </div>
              <div className="flex items-baseline gap-1">
                <span className="text-2xl sm:text-3xl font-black text-white tracking-tight">{value}</span>
                <span className="text-xs font-medium text-slate-500">{unit}</span>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
